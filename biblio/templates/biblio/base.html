{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Bibliothèque MEF{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2c3e50',
                        secondary: '#e74c3c',
                        accent: '#2c3e50',
                        background: '#ffffff',
                        card: '#ffffff',
                    },
                    borderRadius: {
                        md: '0.375rem',
                    },
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    {% block extra_css %}{% endblock %}
</head>

<body class="font-sans bg-white min-h-screen flex flex-col">
    <!-- Main Layout -->
    <div class="flex flex-1">
        <!-- Sidebar fixe -->
        {% include 'biblio/partials/_sidebar.html' %}
        
        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col min-h-screen ml-64">
            {% include 'biblio/partials/_header.html' %}
            
            <!-- Content Container -->
            <main class="flex-1 overflow-auto">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // CSRF Token for Django AJAX requests
        const csrftoken = "{{ csrf_token }}";

        // URLs Django
        const API_URLS = {
            books: "{% url 'api_books' %}",
            book_detail: "{% url 'api_get_book' 0 %}".replace('0', ''),
            categories: "{% url 'api_categories' %}",
            authors: "{% url 'api_authors' %}",
            publishers: "{% url 'api_publishers' %}",
            download: "{% url 'api_download_book' 0 %}".replace('0', '')
        };
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
