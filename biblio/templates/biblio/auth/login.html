{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Bibliothèque MEF{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2c3e50',
                        secondary: '#e74c3c',
                        accent: '#2c3e50',
                        background: '#ffffff',
                        card: '#ffffff',
                    },
                    borderRadius: {
                        md: '0.375rem',
                    },
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    {% block extra_css %}{% endblock %}
</head>

<body class="font-sans bg-white">

    <div class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md p-6">
            <h2 class="mb-6 text-2xl font-bold text-center text-primary">Connexion</h2>

            <form method="post" class="space-y-4">
                {% csrf_token %}

                {% if form.errors %}
                <div class="p-4 text-sm text-red-700 bg-red-100 rounded-md">
                    <p>Votre nom d'utilisateur et votre mot de passe ne correspondent pas. Veuillez réessayer.</p>
                </div>
                {% endif %}

                <div>
                    <label for="id_username" class="block mb-2 text-sm font-medium text-gray-700">Nom
                        d'utilisateur</label>
                    <input type="text" name="username" id="id_username" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>

                <div>
                    <label for="id_password" class="block mb-2 text-sm font-medium text-gray-700">Mot de passe</label>
                    <input type="password" name="password" id="id_password" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>

                <button type="submit"
                    class="w-full py-2 text-sm font-medium text-white transition duration-200 rounded-md bg-primary hover:bg-opacity-90">
                    Se connecter
                </button>

                <input type="hidden" name="next" value="{{ next }}">
            </form>


        </div>
    </div>

</body>

</html>
